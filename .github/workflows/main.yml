name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fix NPM Bug & Install
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install
          npm install @capacitor/android @capacitor/assets
      - name: Build Web Project
        run: npm run build
      - name: Build APK
        run: |
          mkdir -p www
          cp -r dist/* www/
          echo '{"appId":"com.nahjalnur.app","appName":"Nahj Al Nur","webDir":"dist"}' > capacitor.config.json
          
          # إنشاء المجلدات الضرورية للأيقونة
          mkdir -p assets
          cp icon.png assets/icon-only.png
          cp icon.png assets/icon.png
          
          npx cap add android
          
          # توليد الأيقونات بشكل قسري
          npx capacitor-assets generate --android --icon-path assets/icon.png
          
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nahj-Al-Nur-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
